<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Manutenção de Empilhadores</title>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; }
        
        body { 
            font-family: sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            padding: 10px; 
            color: #333; 
            font-size: 21px; 
            line-height: 1.5;
        }
        
        .container { width: 100%; max-width: 100%; margin: 0; box-sizing: border-box; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 0 5px; }
        .logo-area img { height: 45px; width: auto; }
        .version { font-size: 0.9em; color: #7f8c8d; font-weight: bold; }
        
        h1 { text-align: center; color: var(--primary); font-size: 1.5em; margin-bottom: 20px; }
        
        .card { 
            background: #ffffff; 
            padding: 18px; 
            border-radius: 14px; 
            margin-bottom: 14px; 
            border: 1px solid #e0e0e0; 
            box-shadow: 0 2px 6px rgba(0,0,0,0.05); 
        }
        
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        
        label { font-weight: 700; font-size: 1.05em; color: #2c3e50; }
        
        .description { font-size: 0.85em; color: #666; font-style: italic; margin-bottom: 12px; display: block; }
        
        .icon-container { display: flex; gap: 8px; flex-shrink: 0; }
        .icon-container img { width: 30px; height: 30px; object-fit: contain; }
        
        .radio-group { display: flex; gap: 10px; margin-top: 10px; }
        .radio-group label { 
            flex: 1; 
            text-align: center; 
            padding: 14px 8px; 
            background: #f8f8f8; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 0.95em; 
            font-weight: 600; 
            border: 1px solid #ddd; 
        }
        
        input[type="radio"] { display: none; }
        
        .radio-ok:has(input:checked) { background: var(--success); color: white; border-color: #219150; }
        .radio-nok:has(input:checked) { background: var(--danger); color: white; border-color: #c0392b; }
        .radio-machine:has(input:checked) { background: var(--primary); color: white; border-color: #1a252f; }
        
        select, input[type="text"], textarea { 
            width: 100%; 
            padding: 16px; 
            border: 2px solid #ddd; 
            border-radius: 10px; 
            font-size: 21px; 
            margin-top: 8px; 
            background: #fff;
            box-sizing: border-box;
        }
        
        .btn-submit { 
            width: 100%; 
            padding: 20px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-size: 1.2em; 
            font-weight: 700; 
            margin-top: 10px; 
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="top-bar">
        <div class="logo-area"><img src="https://github.com/user-attachments/assets/49049ff4-b05c-45fb-9959-68260195e26b" alt="Logo"></div>
        <div class="version">v1.1.1</div>
    </div>
    <h1>Manutenção de Empilhadores</h1>
    <form id="manutencaoForm">
        <div class="card">
            <label>Nome do condutor</label>
            <select id="nome" required>
                <option value="" disabled selected>Selecione o condutor...</option>
                <option value="Cristian Nourayan">Cristian Nourayan</option>
                <option value="Rui Vicente">Rui Vicente</option>
                <option value="Manuel Costa">Manuel Costa</option>
                <option value="Simão Ribeiro">Simão Ribeiro</option>
                <option value="Yuri Damasceno">Yuri Damasceno</option>
                <option value="Dulcídio Magalhães">Dulcídio Magalhães</option>
                <option value="Luís Sousa">Luís Sousa</option>
                <option value="Marcos Farias">Marcos Farias</option>
            </select>
        </div>
        <div class="card"><label>Turno</label>
            <div class="radio-group">
                <label class="radio-ok"><input type="radio" name="turno" value="Manhã" required> Manhã</label>
                <label class="radio-ok"><input type="radio" name="turno" value="Tarde" required> Tarde</label>
                <label class="radio-ok"><input type="radio" name="turno" value="Noite" required> Noite</label>
                <label class="radio-ok"><input type="radio" name="turno" value="Fim de Semana" required> Fim de Semana</label>
            </div>
        </div>
        <div class="card"><label>Máquina</label>
            <div class="radio-group">
                <label class="radio-machine"><input type="radio" name="maquina" value="Linde E16" required> Linde E16</label>
                <label class="radio-machine"><input type="radio" name="maquina" value="Linde E20" required> Linde E20</label>
                <label class="radio-machine"><input type="radio" name="maquina" value="Linde E30" required> Linde E30</label>
                <label class="radio-machine"><input type="radio" name="maquina" value="Linde P60" required> Linde P60</label>
            </div>
        </div>
        <div id="checklistItems"></div>
        <div class="card">
            <label>U. Outras observações</label>
            <textarea id="obs" rows="3"></textarea>
        </div>
        <div class="card">
            <label>V. Anotação contador de horas</label>
            <input type="text" id="horas" required>
        </div>
        <button type="submit" class="btn-submit">Submeter Registo</button>
    </form>
</div>
<script>
    const icons = {testar: "https://github.com/user-attachments/assets/c2c7b561-23f1-48c3-8dc7-727cfba486c2", auditivo: "https://github.com/user-attachments/assets/2a8ab473-1627-4e32-aac5-c1225c3e6cf5", visual: "https://github.com/user-attachments/assets/cb49c6b4-f03a-448e-905a-357d38621832"};
    const items = [
        {t: "A. Fugas de óleo", desc: "Gotas/óleo no chão", ic: ['visual']},
        {t: "B. Pneumáticos", desc: "Cortes, deformações, parafusos soltos", ic: ['visual']},
        {t: "C. Garfos", desc: "Deformação e funcionamento", ic: ['visual']},
        {t: "D. Engate de tração", desc: "Parafusos, eixo e bola de reboque", ic: ['visual']},
        {t: "E. Cadeados e correntes", desc: "Estado, arrastamento e ruídos", ic: ['visual', 'auditivo']},
        {t: "F. Rolamentos e mastro", desc: "Ruídos anormais", ic: ['visual', 'auditivo']},
        {t: "G. Autonomia", desc: "Verificar indicadores", ic: ['visual']},
        {t: "H. Níveis de fluidos", desc: "Óleo motor, água, travões, vibrações", ic: ['visual', 'testar']},
        {t: "I. Bateria", desc: "Terminais, cabos e conectores", ic: ['visual']},
        {t: "J. Proteção do condutor", desc: "Estado do tejadilho/cabine", ic: ['visual']},
        {t: "K. Tejadilho", desc: "Limpeza e visibilidade", ic: ['visual']},
        {t: "L. Dispositivo presença", desc: "Funcionamento", ic: ['testar']},
        {t: "M. Travões", desc: "Funcionamento", ic: ['testar']},
        {t: "N. Pedal segurança", desc: "Funcionamento", ic: ['testar']},
        {t: "O. Buzina/Pirilampo", desc: "Funcionamento", ic: ['testar']},
        {t: "P. Luzes/Piscas", desc: "Funcionamento", ic: ['testar']},
        {t: "Q. Elevação/Inclinação", desc: "Funcionamento", ic: ['testar']},
        {t: "R. Ignição", desc: "Funcionamento", ic: ['testar']},
        {t: "S. Direcção", desc: "Funcionamento", ic: ['testar']},
        {t: "T. Cinto segurança", desc: "Funcionamento", ic: ['testar']}
    ];
    const container = document.getElementById('checklistItems');
    items.forEach((item, index) => {
        const div = document.createElement('div'); div.className = 'card';
        div.innerHTML = `<div class="header-row"><label>${item.t}</label><div class="icon-container">${item.ic.map(i=>`<img src="${icons[i]}">`).join('')}</div></div>
        <span class="description">${item.desc}</span>
        <div class="radio-group"><label class="radio-ok"><input type="radio" name="item_${index}" value="OK" required> OK</label><label class="radio-nok"><input type="radio" name="item_${index}" value="NOK" required> NOK</label></div>`;
        container.appendChild(div);
    });
    document.getElementById('manutencaoForm').addEventListener('submit', function(e) {
        e.preventDefault();
        let formData = { nome: document.getElementById('nome').value, turno: document.querySelector('input[name="turno"]:checked').value, maquina: document.querySelector('input[name="maquina"]:checked').value };
        items.forEach((_, i) => { formData[`item_${i}`] = document.querySelector(`input[name="item_${i}"]:checked`).value; });
        formData.observacoes = document.getElementById('obs').value;
        formData.horas = document.getElementById('horas').value;
        fetch('https://script.google.com/macros/s/AKfycbyczR7UvxIY7EWDVZXu6kIEDcLLOY1LxiQdvoF3AdQkSfu7GC3U91a6nacXVs7GBTYMEQ/exec', { method: 'POST', mode: 'no-cors', body: JSON.stringify(formData) }).then(() => { alert('Enviado!'); location.reload(); });
    });
    if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js'); }); }
</script>
</body>
</html>
