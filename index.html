<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manutenção de Empilhadores</title>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; }
        
        body { font-family: sans-serif; background-color: var(--bg); margin: 0; padding: 20px; color: #333; font-size: 18px; }
        
        .container { max-width: 600px; margin: auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .logo-area img { height: 50px; width: auto; }
        .version { font-size: 1em; color: #7f8c8d; font-weight: bold; }
        
        h1 { text-align: center; color: var(--primary); font-size: 1.8em; margin-bottom: 25px; }
        
        .card { background: #ffffff; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #eee; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        .header-row { display: flex; justify-content: space-between; align-items: center; gap: 15px; margin-bottom: 10px; }
        
        label { font-weight: 700; display: block; margin-bottom: 8px; font-size: 1.1em; line-height: 1.4; }
        
        .description { font-size: 0.9em; color: #555; font-style: italic; display: block; margin-bottom: 15px; line-height: 1.5; }
        
        .icon-container { display: flex; gap: 12px; flex-shrink: 0; }
        .icon-container img { width: 35px; height: 35px; object-fit: contain; }
        
        .radio-group { display: flex; gap: 12px; margin-top: 15px; flex-wrap: wrap; }
        .radio-group label { flex: 1; min-width: 45%; text-align: center; padding: 15px; background: #f8f8f8; border-radius: 10px; cursor: pointer; transition: 0.2s; font-weight: bold; font-size: 1em; border: 1px solid #ddd; margin: 0; }
        
        input[type="radio"] { display: none; }
        
        .radio-ok:has(input:checked) { background: var(--success); color: white; border-color: var(--success); }
        .radio-nok:has(input:checked) { background: var(--danger); color: white; border-color: var(--danger); }
        .radio-machine:has(input:checked) { background: var(--primary); color: white; border-color: var(--primary); }
        
        select, input[type="text"], textarea { width: 100%; padding: 16px; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 18px; margin-top: 8px; background: white; }
        
        .btn-submit { width: 100%; padding: 22px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 1.3em; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="top-bar">
        <div class="logo-area"><img src="https://github.com/user-attachments/assets/49049ff4-b05c-45fb-9959-68260195e26b" alt="Logo"></div>
        <div class="version">v2.1.1</div>
    </div>
    <h1>Manutenção de Empilhadores</h1>
    <form id="manutencaoForm">
        <div class="card">
            <label>Nome do condutor</label>
            <select id="nome" required>
                <option value="" disabled selected>Selecione o condutor...</option>
                <option value="Cristian Nourayan">Cristian Nourayan</option>
                <option value="Rui Vicente">Rui Vicente</option>
                <option value="Manuel Costa">Manuel Costa</option>
                <option value="Simão Ribeiro">Simão Ribeiro</option>
                <option value="Yuri Damasceno">Yuri Damasceno</option>
                <option value="Dulcídio Magalhães">Dulcídio Magalhães</option>
                <option value="Luís Sousa">Luís Sousa</option>
                <option value="Marcos Farias">Marcos Farias</option>
            </select>
        </div>
        <div class="card"><label>Turno</label>
            <div class="radio-group">
                <label class="radio-ok"><input type="radio" name="turno" value="Manhã" required> Manhã</label>
                <label class="radio-ok"><input type="radio" name="turno" value="Tarde" required> Tarde</label>
                <label class="radio-ok"><input type="radio" name="turno" value="Noite" required> Noite</label>
                <label class="radio-ok"><input type="radio" name="turno" value="Fim de Semana" required> Fim de Semana</label>
            </div>
        </div>
        <div class="card"><label>Máquina</label>
            <div class="radio-group">
                <label class="radio-machine"><input type="radio" name="maquina" value="Linde E16" required> Linde E16</label>
                <label class="radio-machine"><input type="radio" name="maquina" value="Linde E20" required> Linde E20</label>
                <label class="radio-machine"><input type="radio" name="maquina" value="Linde E30" required> Linde E30</label>
                <label class="radio-machine"><input type="radio" name="maquina" value="Linde P60" required> Linde P60</label>
            </div>
        </div>
        <div id="checklistItems"></div>
        <div class="card">
            <label>U. Outras observações</label>
            <span class="description">Indicar as anomalias detectadas em outros elementos que não apareçam nesta lista (limpeza geral, eliminação de adornos, pintura deteriorada e outros elementos no empilhador)</span>
            <textarea id="obs" rows="3"></textarea>
        </div>
        <div class="card">
            <label>V. Anotação contador de horas</label>
            <span class="description">Anotar as horas que aparecem no contador existente</span>
            <input type="text" id="horas" required>
        </div>
        <button type="submit" class="btn-submit">Submeter Registo</button>
    </form>
</div>
<script>
    const icons = {testar: "https://github.com/user-attachments/assets/c2c7b561-23f1-48c3-8dc7-727cfba486c2", auditivo: "https://github.com/user-attachments/assets/2a8ab473-1627-4e32-aac5-c1225c3e6cf5", visual: "https://github.com/user-attachments/assets/cb49c6b4-f03a-448e-905a-357d38621832"};
    const items = [
        {t: "A. Fugas de óleo", desc: "Gotas/óleo no chão", ic: ['visual']},
        {t: "B. Pneumáticos e parafusos das rodas", desc: "Cortes nos pneus, deformações - parafusos soltos", ic: ['visual']},
        {t: "C. Garfos", desc: "Deformação dos garfos - se existir sistema a deslocação dos garfos verificar o seu funcionamento", ic: ['visual']},
        {t: "D. Engate de tração", desc: "- Parafusos de fixação e estado do eixo e bola de reboque", ic: ['visual']},
        {t: "E. Cadeados de elevação dos garfos", desc: "Estado - verificar se os garfos não se arrastam pelo chão - durante a condução, ganchos ou retenções das correntes e barulhos anormais", ic: ['visual', 'auditivo']},
        {t: "F. Rolamentos e mastro", desc: "Verificar no interior da torre se está algo a roçar - durante a condução os ruídos típicos de rolamentos em mau estado", ic: ['visual', 'auditivo']},
        {t: "G. Autonomia bateria / combustível", desc: "- Verificar os indicadores", ic: ['visual']},
        {t: "H. Níveis de fluidos", desc: "- Mediante indicadores de nível: óleo motor, água, líquido dos travões - no depósito (se visível), óleo hidráulico: levantar os garfos ao máximo e comprovar que não se produzem vibrações", ic: ['visual', 'testar']},
        {t: "I. Bateria (estado, cabos e conector)", desc: "Terminais e cabos não têm corrosão - conectores apresentam sobreaquecimentos por mau contacto - ver se existe cabos descarnados ou cortados", ic: ['visual']},
        {t: "J. Proteção do condutor (apoio, tejadilho, cabine)", desc: "Estado dos elementos e seus acessórios", ic: ['visual']},
        {t: "K. Tejadilho", desc: "Verificar se está limpo e em bom estado; se é possível ver através do tejadilho", ic: ['visual']},
        {t: "L. Dispositivo de presença do condutor", desc: "Verificar do posto de condução o seu funcionamento", ic: ['testar']},
        {t: "M. Travões de serviço e imobilização (1)", desc: "Verificar o seu funcionamento", ic: ['testar']},
        {t: "N. Pedal de segurança", desc: "Verificar o seu funcionamento", ic: ['testar']},
        {t: "O. Buzina, pirilampo luminoso", desc: "Verificar o seu funcionamento", ic: ['testar']},
        {t: "P. Luzes e piscas (nas que existem)", desc: "Verificar o seu funcionamento", ic: ['testar']},
        {t: "Q. Elevação e inclinação dos garfos", desc: "Verificar o seu funcionamento", ic: ['testar']},
        {t: "R. Chave de ignição", desc: "Verificar o seu funcionamento", ic: ['testar']},
        {t: "S. Direcção", desc: "Verificar o seu funcionamento", ic: ['testar']},
        {t: "T. Cinto de segurança", desc: "Verificar o seu funcionamento", ic: ['testar']}
    ];
    const container = document.getElementById('checklistItems');
    items.forEach((item, index) => {
        const div = document.createElement('div'); div.className = 'card';
        div.innerHTML = `<div class="header-row"><label>${item.t}</label><div class="icon-container">${item.ic.map(i=>`<img src="${icons[i]}">`).join('')}</div></div>
        <span class="description">${item.desc}</span>
        <div class="radio-group"><label class="radio-ok"><input type="radio" name="item_${index}" value="OK" required> OK</label><label class="radio-nok"><input type="radio" name="item_${index}" value="NOK" required> NOK</label></div>`;
        container.appendChild(div);
    });
    document.getElementById('manutencaoForm').addEventListener('submit', function(e) {
        e.preventDefault();
        let formData = { nome: document.getElementById('nome').value, turno: document.querySelector('input[name="turno"]:checked').value, maquina: document.querySelector('input[name="maquina"]:checked').value };
        items.forEach((_, i) => { formData[`item_${i}`] = document.querySelector(`input[name="item_${i}"]:checked`).value; });
        formData.observacoes = document.getElementById('obs').value;
        formData.horas = document.getElementById('horas').value;
        fetch('https://script.google.com/macros/s/AKfycbyczR7UvxIY7EWDVZXu6kIEDcLLOY1LxiQdvoF3AdQkSfu7GC3U91a6nacXVs7GBTYMEQ/exec', { method: 'POST', mode: 'no-cors', body: JSON.stringify(formData) }).then(() => { alert('Enviado!'); location.reload(); });
    });
</script>
</body>
</html>
